name: lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff
        run: ruff check --config backend-python/pyproject.toml backend-python

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Prepare backend typecheck venv
        run: |
          python -m venv backend-python/.venv
          backend-python/.venv/bin/python -m pip install --upgrade pip
          backend-python/.venv/bin/python -m pip install pillow pyyaml openai-agents json-repair

      - name: Pyright (backend)
        run: npm run lint:types

      - name: Typecheck (frontend)
        run: npm run typecheck:frontend

      - name: ESLint
        run: npm run lint:frontend
