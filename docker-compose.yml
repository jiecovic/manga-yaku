services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mangayaku
      POSTGRES_PASSWORD: mangayaku
      POSTGRES_DB: mangayaku
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mangayaku -d mangayaku"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

